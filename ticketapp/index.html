<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1">
<title>Velocity Relay</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#05070C;--cell:#0D1320;--line:rgba(120,170,220,.12);--line2:rgba(120,170,220,.22);
 --cyan:#1AE5FF;--green:#3DFF9A;--amber:#FFB020;--red:#FF4D5E;--violet:#9D8CFF;
 --txt:#EAF3FF;--txt2:#8AA0BE;--txt3:#53678A;--d:'Chakra Petch',sans-serif;--m:'JetBrains Mono',monospace}
html,body{height:100%;background:var(--bg)}
body{font-family:var(--d);color:var(--txt);display:flex;flex-direction:column;height:100vh;overflow:hidden;
 background:radial-gradient(700px 400px at 50% -10%,rgba(26,229,255,.10),transparent 60%),
 radial-gradient(560px 420px at 100% 4%,rgba(255,176,32,.06),transparent 55%),var(--bg)}
.top{flex:0 0 auto;padding:13px 14px 9px;border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;gap:10px}
.glyph{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;
 background:linear-gradient(135deg,var(--cyan),#1AA6FF);color:#04070D;box-shadow:0 0 18px rgba(26,229,255,.5)}
.wm{font-weight:700;font-size:15px;letter-spacing:1.1px;line-height:1.05}
.wm small{display:block;font-family:var(--m);font-size:7.5px;letter-spacing:3px;color:var(--txt2);margin-top:2px}
.opp{margin-left:auto;text-align:right;font-family:var(--m);font-size:9px;color:var(--txt3);cursor:pointer}
.opp .live{color:var(--green)}
.bell{position:relative;font-size:16px;margin-left:6px;cursor:pointer}
.bell .bdg{position:absolute;top:-6px;right:-7px;background:var(--amber);color:#04070D;font-family:var(--m);
 font-size:8px;font-weight:700;border-radius:8px;padding:1px 4px;min-width:14px;text-align:center;display:none}
.bell.has .bdg{display:block}
.kp{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}
.kc{background:var(--cell);border:1px solid var(--line);border-radius:10px;padding:8px 6px;text-align:center}
.kc .l{font-family:var(--m);font-size:8px;letter-spacing:1px;color:var(--txt3)}
.kc .n{font-weight:700;font-size:20px;line-height:1;margin-top:3px}
.kc.open .n{color:var(--amber)}.kc.openclr .n{color:var(--green)}.kc.prog .n{color:var(--cyan)}.kc.done .n{color:var(--green)}.kc.rep .n{color:var(--violet)}
.tabs{display:flex;gap:6px;margin-top:10px}
.tab{flex:1;text-align:center;font-family:var(--m);font-size:10px;letter-spacing:.5px;padding:7px 0;border-radius:8px;
 border:1px solid var(--line);background:var(--cell);color:var(--txt2)}
.tab.on{background:var(--cyan);color:#04070D;border-color:var(--cyan);font-weight:700}
.tools{display:flex;gap:7px;margin-top:8px}
.search{flex:1;background:var(--cell);border:1px solid var(--line);border-radius:9px;color:var(--txt);
 font-family:var(--m);font-size:12px;padding:8px 11px}
.search:focus{outline:none;border-color:var(--cyan)}
.sortbtn{flex:0 0 auto;background:var(--cell);border:1px solid var(--line);border-radius:9px;color:var(--txt2);
 font-family:var(--m);font-size:11px;padding:8px 10px}
.chips{display:flex;gap:7px;overflow-x:auto;margin-top:8px;padding-bottom:2px}
.chip{flex:0 0 auto;font-family:var(--m);font-size:11px;padding:6px 11px;border-radius:18px;border:1px solid var(--line2);
 background:var(--cell);color:var(--txt2);white-space:nowrap;display:flex;align-items:center;gap:6px}
.chip i{width:8px;height:8px;border-radius:50%}
.chip.on{color:#04070D;background:var(--cyan);border-color:var(--cyan);font-weight:700}.chip.on i{display:none}
.alert{margin-top:9px;border-radius:9px;padding:9px 12px;font-family:var(--m);font-size:11px;letter-spacing:.5px;
 color:var(--amber);background:rgba(255,176,32,.10);border:1px solid rgba(255,176,32,.35);display:none;align-items:center;gap:9px;
 animation:pulse 1.6s infinite}
.alert.on{display:flex}
@keyframes pulse{50%{box-shadow:0 0 16px rgba(255,176,32,.3)}}
.list{flex:1 1 auto;overflow-y:auto;padding:10px 14px 24px;-webkit-overflow-scrolling:touch}
.sec{font-family:var(--m);font-size:9px;letter-spacing:2px;color:var(--txt3);margin:10px 2px 7px;display:flex;align-items:center;gap:9px;cursor:pointer}
.sec::after{content:"";flex:1;height:1px;background:var(--line)}
/* insights */
.ins{background:var(--cell);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-top:2px;font-family:var(--m);font-size:11px}
.ins .gr{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px}
.ins .gr div span{color:var(--txt3)}.ins .gr div b{color:var(--cyan)}
.spark{font-family:var(--m);font-size:15px;letter-spacing:1px;color:var(--cyan);margin-top:7px;line-height:1}
.row{display:flex;align-items:center;gap:9px;background:var(--cell);border:1px solid var(--line);border-radius:10px;
 padding:11px 12px;margin-top:8px;border-left:3px solid var(--line)}
.row:active{transform:scale(.99)}
.tag{font-family:var(--m);font-size:8px;padding:3px 6px;border-radius:5px;flex:0 0 auto;min-width:54px;text-align:center}
.tag.new{color:var(--amber);background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.3)}
.tag.prog{color:var(--cyan);background:rgba(26,229,255,.12);border:1px solid rgba(26,229,255,.3)}
.tag.done{color:var(--green);background:rgba(61,255,154,.1);border:1px solid rgba(61,255,154,.25)}
.tid{font-family:var(--m);font-size:10px;color:var(--txt3);font-weight:700}
.ttl{font-weight:600;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pri{font-family:var(--m);font-size:8px;padding:2px 5px;border-radius:4px;flex:0 0 auto}
.pri.high{color:var(--red);background:rgba(255,77,94,.14);border:1px solid rgba(255,77,94,.4)}
.pri.med{color:var(--amber);background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.35)}
.pri.low{color:var(--txt2);background:rgba(120,170,220,.08);border:1px solid var(--line)}
.stale{color:var(--red);font-size:11px;flex:0 0 auto}
.asg{font-family:var(--m);font-size:8px;color:var(--violet);border:1px solid rgba(157,140,255,.4);border-radius:8px;padding:2px 5px;flex:0 0 auto}
.who{font-family:var(--m);font-size:9px;display:flex;align-items:center;gap:5px;flex:0 0 auto}.who i{width:7px;height:7px;border-radius:50%}
.badge{font-family:var(--m);font-size:9px;color:var(--cyan);background:rgba(26,229,255,.1);border-radius:9px;padding:2px 6px;flex:0 0 auto}
.meta-r{font-family:var(--m);font-size:9px;color:var(--txt3);flex:0 0 auto;min-width:26px;text-align:right}
.empty{font-family:var(--m);font-size:12px;color:var(--green);text-align:center;padding:18px;background:var(--cell);border:1px dashed rgba(61,255,154,.25);border-radius:10px;margin-top:8px}
/* detail sheet */
.sheet{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:60}
.sheet.on{display:flex}
.sh-top{flex:0 0 auto;padding:14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.sh-top .back{font-family:var(--m);font-size:12px;color:var(--cyan);cursor:pointer}
.sh-body{flex:1 1 auto;overflow-y:auto;padding:14px}
.dt{font-size:18px;font-weight:700;line-height:1.25;margin-bottom:8px}
.dm{font-family:var(--m);font-size:11px;color:var(--txt2);display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.dm span{background:var(--cell);border:1px solid var(--line);border-radius:6px;padding:4px 8px}
.shots{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px}
.shots img{height:120px;border-radius:8px;border:1px solid var(--line2);flex:0 0 auto}
.pdfbtn{display:inline-block;font-family:var(--m);font-size:11px;color:var(--cyan);border:1px solid rgba(26,229,255,.4);
 border-radius:8px;padding:7px 12px;margin-bottom:12px;text-decoration:none}
.db{font-size:13px;color:#C3D2E4;line-height:1.6;white-space:pre-wrap;background:var(--cell);border:1px solid var(--line);border-radius:10px;padding:12px}
.thread{margin-top:14px}.tmsg{margin-top:8px;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.5}
.tmsg.office{background:rgba(26,229,255,.08);border:1px solid rgba(26,229,255,.25);margin-left:24px}
.tmsg.reporter{background:var(--cell);border:1px solid var(--line);margin-right:24px}
.tmsg .a{font-family:var(--m);font-size:8.5px;color:var(--txt3);margin-bottom:3px}
.acts{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.act{font-family:var(--m);font-size:11px;padding:8px 12px;border-radius:9px;border:1px solid var(--line2);background:var(--cell);color:var(--txt2)}
.act.go{background:rgba(61,255,154,.12);border-color:rgba(61,255,154,.4);color:var(--green)}
.act.warn{background:rgba(255,176,32,.12);border-color:rgba(255,176,32,.4);color:var(--amber)}
.act.asn{background:rgba(157,140,255,.12);border-color:rgba(157,140,255,.4);color:var(--violet)}
.tmpl{margin-top:12px;display:flex;gap:7px;overflow-x:auto;padding-bottom:2px}
.tmpl button{flex:0 0 auto;font-family:var(--m);font-size:10px;color:var(--txt2);background:var(--cell);border:1px solid var(--line);border-radius:14px;padding:6px 10px;white-space:nowrap}
.reply{flex:0 0 auto;display:flex;gap:8px;padding:11px 14px;border-top:1px solid var(--line);background:#070A11}
.reply textarea{flex:1;resize:none;height:42px;background:var(--cell);border:1px solid var(--line2);border-radius:10px;
 color:var(--txt);font-family:var(--d);font-size:13px;padding:10px 12px}
.reply textarea:focus{outline:none;border-color:var(--cyan)}
.reply .send{flex:0 0 auto;background:linear-gradient(135deg,var(--cyan),#1AA6FF);color:#04070D;font-weight:700;
 border:none;border-radius:10px;padding:0 16px;font-family:var(--m);font-size:12px}
.deny{padding:60px 24px;text-align:center;font-family:var(--m);color:var(--amber)}
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--cell);border:1px solid var(--line2);
 color:var(--txt);font-family:var(--m);font-size:12px;padding:9px 14px;border-radius:10px;z-index:99;opacity:0;transition:.2s}
.toast.on{opacity:1}
</style></head><body>
<div id="app" style="display:none;flex-direction:column;height:100%">
  <div class="top">
    <div class="bar">
      <div class="glyph">📡</div>
      <div class="wm">VELOCITY RELAY<small>MISSION&nbsp;CONTROL&nbsp;//&nbsp;TICKET&nbsp;OPS</small></div>
      <div class="bell" id="bell" onclick="clearNew()">🔔<span class="bdg" id="bdg">0</span></div>
      <div class="opp" onclick="load()"><span class="live">●</span> <span id="ts">LIVE</span></div>
    </div>
    <div class="kp" id="kp"></div>
    <div class="tabs" id="tabs"></div>
    <div class="tools">
      <input class="search" id="q" placeholder="search tickets…" oninput="STATE.q=this.value;render()">
      <button class="sortbtn" id="sortbtn" onclick="cycleSort()">↕ newest</button>
    </div>
    <div class="chips" id="chips"></div>
    <div class="alert" id="alert" onclick="clearNew()"></div>
  </div>
  <div class="list" id="list"></div>
</div>
<div class="deny" id="deny" style="display:none">⚠ Not authorized.<br>This board is private to the planning office.</div>
<div class="sheet" id="sheet">
  <div class="sh-top"><span class="back" id="back">‹ BACK</span><span class="tid" id="sh-id"></span></div>
  <div class="sh-body" id="sh-body"></div>
  <div class="tmpl" id="tmpl"></div>
  <div class="reply"><textarea id="reply-text" placeholder="Reply to the planner…"></textarea><button class="send" id="reply-send">SEND</button></div>
</div>
<div class="toast" id="toast"></div>
<script>
var tg=window.Telegram&&window.Telegram.WebApp?window.Telegram.WebApp:null;
var API="https://hrrdohlrfrficrtphcet.supabase.co/functions/v1/velocity-relay";
var SORTS=[["new","↕ newest"],["prio","↕ priority"],["age","↕ oldest"]];
var TEMPLATES=["Fixed — please update to the latest version.","Building this now.","Need more info — can you share steps or a screenshot?","Can't reproduce — is it still happening?","Shipped ✅"];
var STATE={tickets:[],tab:"all",q:"",kind:"all",sort:"new",reporter:null,cur:null,first:true,lastSeen:0,newIds:[]};
try{STATE.lastSeen=parseInt(localStorage.getItem("vr_lastseen")||"0",10)||0}catch(e){}
function H(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function ageH(iso){try{return (Date.now()-new Date(iso).getTime())/3.6e6}catch(e){return 0}}
function ageS(iso){var h=ageH(iso);return h<48?(h|0)+'h':((h/24)|0)+'d'}
var PAL=["#1AE5FF","#3DFF9A","#FFB020","#9D8CFF","#FF6FB5","#2DD4BF","#5B9DFF","#FF4D5E"];
function color(n){var h=0,s=String(n||'?');for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return PAL[h%PAL.length]}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},1900)}
function hdrs(){return{'Content-Type':'application/json','X-Init-Data':tg?tg.initData:''}}
function api(p,opt){opt=opt||{};opt.headers=hdrs();return fetch(API+p,opt).then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j}})})}
function priClass(p){p=(p||'').toLowerCase();return p.indexOf('high')>=0||p.indexOf('crit')>=0?'high':(p.indexOf('med')>=0?'med':'low')}

if(tg){try{tg.ready();tg.expand();tg.enableClosingConfirmation&&tg.enableClosingConfirmation();
 tg.setHeaderColor&&tg.setHeaderColor('#05070C');tg.setBackgroundColor&&tg.setBackgroundColor('#05070C');
 if(tg.MainButton){tg.MainButton.setParams({text:'⟳ REFRESH',color:'#0D1320',text_color:'#1AE5FF'});tg.MainButton.show();tg.MainButton.onClick(function(){load();tg.HapticFeedback&&tg.HapticFeedback.impactOccurred('light')})}
}catch(e){}}

function load(){
  api('/tickets').then(function(res){
    if(!res.ok){document.getElementById('app').style.display='none';document.getElementById('deny').style.display='block';return}
    var prevMax=STATE.tickets.reduce(function(m,t){return Math.max(m,t.id)},0);
    STATE.tickets=res.j.tickets||[];
    document.getElementById('app').style.display='flex';
    var now=new Date();document.getElementById('ts').textContent='LIVE '+('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2)+':'+('0'+now.getSeconds()).slice(-2);
    var mxId=STATE.tickets.reduce(function(m,t){return Math.max(m,t.id)},0);
    if(STATE.first && !STATE.lastSeen){STATE.lastSeen=mxId;try{localStorage.setItem('vr_lastseen',String(mxId))}catch(e){}}
    // new-ticket detection
    STATE.newIds=STATE.tickets.filter(function(t){return t.id>STATE.lastSeen}).map(function(t){return t.id});
    if(!STATE.first && prevMax && STATE.tickets.some(function(t){return t.id>prevMax})){
      tg&&tg.HapticFeedback&&tg.HapticFeedback.notificationOccurred('warning');
    }
    render();
    STATE.first=false;
  }).catch(function(){toast('connection error')});
}
function counts(){var o=0,p=0,d=0,reps={};STATE.tickets.forEach(function(t){if(t.open&&!t.prog)o++;if(t.prog)p++;if(t.done)d++;reps[t.who]=1});return{o:o,p:p,d:d,r:Object.keys(reps).length}}
function animateNum(el,to){var from=0,t0=null;function step(ts){if(!t0)t0=ts;var k=Math.min((ts-t0)/650,1);k=1-Math.pow(1-k,3);el.textContent=Math.round(from+(to-from)*k);if(k<1)requestAnimationFrame(step)}requestAnimationFrame(step)}
function render(){
  var c=counts();
  document.getElementById('kp').innerHTML=
   '<div class="kc open"><div class="l">OPEN</div><div class="n" id="n0">'+c.o+'</div></div>'+
   '<div class="kc prog"><div class="l">IN-PROG</div><div class="n" id="n1">'+c.p+'</div></div>'+
   '<div class="kc done"><div class="l">SHIPPED</div><div class="n" id="n2">'+c.d+'</div></div>'+
   '<div class="kc rep"><div class="l">REPORTERS</div><div class="n" id="n3">'+c.r+'</div></div>';
  if(STATE.first){animateNum(document.getElementById('n0'),c.o);animateNum(document.getElementById('n1'),c.p);animateNum(document.getElementById('n2'),c.d);animateNum(document.getElementById('n3'),c.r);}
  // tabs
  var tabs=[["all","ALL"],["open","OPEN"],["prog","IN-PROG"],["done","SHIPPED"]];
  document.getElementById('tabs').innerHTML=tabs.map(function(t){return '<div class="tab '+(STATE.tab===t[0]?'on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</div>'}).join('');
  // reporter chips + kind
  var reps={};STATE.tickets.forEach(function(t){reps[t.who]=t.color});
  var ch='<div class="chip '+(STATE.kind==='all'&&STATE.reporter===null?'on':'')+'" onclick="setKind(\'all\');setRep(null)">ALL</div>'+
         '<div class="chip '+(STATE.kind==='bug'?'on':'')+'" onclick="setKind(\'bug\')">🐛 BUGS</div>'+
         '<div class="chip '+(STATE.kind==='feature'?'on':'')+'" onclick="setKind(\'feature\')">✨ FEAT</div>';
  Object.keys(reps).forEach(function(n){ch+='<div class="chip '+(STATE.reporter===n?'on':'')+'" onclick="setRep(\''+n.replace(/'/g,"\\'")+'\')"><i style="background:'+reps[n]+'"></i>'+H(n)+'</div>'});
  document.getElementById('chips').innerHTML=ch;
  // new alert
  var al=document.getElementById('alert');
  if(STATE.newIds.length){al.classList.add('on');al.innerHTML='🔔 '+STATE.newIds.length+' NEW since you last looked — tap to clear';document.getElementById('bell').classList.add('has');document.getElementById('bdg').textContent=STATE.newIds.length;}
  else{al.classList.remove('on');document.getElementById('bell').classList.remove('has');}
  document.getElementById('list').innerHTML=insightsHtml()+listHtml();
}
function applyFilters(){
  var q=STATE.q.toLowerCase();
  return STATE.tickets.filter(function(t){
    if(STATE.tab==='open'&&!(t.open&&!t.prog))return false;
    if(STATE.tab==='prog'&&!t.prog)return false;
    if(STATE.tab==='done'&&!t.done)return false;
    if(STATE.kind!=='all'&&t.kind!==STATE.kind)return false;
    if(STATE.reporter&&t.who!==STATE.reporter)return false;
    if(q&&(String(t.title).toLowerCase().indexOf(q)<0 && String(t.body).toLowerCase().indexOf(q)<0 && String(t.id).indexOf(q)<0))return false;
    return true;
  }).sort(function(a,b){
    if(STATE.sort==='age')return ageH(b.created)-ageH(a.created);
    if(STATE.sort==='prio'){var r={high:3,med:2,low:1};return (r[priClass(b.priority)]||0)-(r[priClass(a.priority)]||0)||b.id-a.id;}
    return b.id-a.id;
  });
}
function listHtml(){
  var ts=applyFilters();
  if(!ts.length)return '<div class="sec">// TICKETS</div><div class="empty">✦ nothing matches</div>';
  var opens=ts.filter(function(t){return t.open}),done=ts.filter(function(t){return t.done});
  var h='';
  if(STATE.tab==='all'){
    h+='<div class="sec">// INBOX'+(opens.length?(' · '+opens.length):'')+'</div>';
    h+=opens.length?opens.map(rowHtml).join(''):'<div class="empty">✦ ALL CLEAR — nothing waiting</div>';
    h+='<div class="sec">// SHIPPED · RECENT</div>'+(done.length?done.slice(0,40).map(rowHtml).join(''):'<div class="empty" style="color:var(--txt3);border-color:var(--line)">none</div>');
  }else{
    h+='<div class="sec">// '+STATE.tab.toUpperCase()+' · '+ts.length+'</div>'+ts.map(rowHtml).join('');
  }
  return h;
}
function rowHtml(t){
  var tag=t.done?'done':(t.prog?'prog':'new'),lab=t.done?'SHIPPED':(t.prog?'PROG':'NEW');
  var ic=t.kind==='bug'?'🐛':'✨',right=t.done?('v'+(H(t.ver)||'?')):ageS(t.created);
  var thread=t.thread&&t.thread.length?('<span class="badge">💬 '+t.thread.length+'</span>'):'';
  var pri=t.priority?('<span class="pri '+priClass(t.priority)+'">'+H(String(t.priority).toUpperCase().slice(0,4))+'</span>'):'';
  var stale=(!t.done && ageH(t.created)>48)?'<span class="stale" title="open >2 days">⚠</span>':'';
  var asg=t.assignee?('<span class="asg">'+H(t.assignee)+'</span>'):'';
  var isnew=STATE.newIds.indexOf(t.id)>=0?'<span class="badge" style="color:var(--amber);background:rgba(255,176,32,.12)">NEW</span>':'';
  return '<div class="row" style="border-left-color:'+t.color+'" onclick="openT('+t.id+')">'+
   '<span class="tag '+tag+'">'+lab+'</span><span class="tid">#'+H(t.id)+'</span>'+
   '<span class="ttl">'+ic+' '+H(t.title)+'</span>'+isnew+pri+stale+thread+asg+
   '<span class="who" style="color:'+t.color+'"><i style="background:'+t.color+'"></i>'+H(t.who)+'</span>'+
   '<span class="meta-r">'+right+'</span></div>';
}
function insightsHtml(){
  var ts=STATE.tickets;if(!ts.length)return'';
  var doneT=ts.filter(function(t){return t.done&&t.resolved&&t.created});
  var avg='—';
  if(doneT.length){var s=0;doneT.forEach(function(t){s+=(new Date(t.resolved)-new Date(t.created))/3.6e6});var a=s/doneT.length;avg=a<48?a.toFixed(1)+'h':(a/24).toFixed(1)+'d';}
  var weekAgo=Date.now()-7*864e5;var wk=ts.filter(function(t){return new Date(t.created).getTime()>weekAgo}).length;
  var stale=ts.filter(function(t){return !t.done&&ageH(t.created)>48}).length;
  // 7-day created sparkline
  var bins=[0,0,0,0,0,0,0];ts.forEach(function(t){var d=Math.floor((Date.now()-new Date(t.created).getTime())/864e5);if(d>=0&&d<7)bins[6-d]++});
  var mx=Math.max.apply(null,bins)||1;var blk='▁▂▃▄▅▆▇';var spark=bins.map(function(v){return blk[Math.min(6,Math.round(v/mx*6))]}).join('');
  return '<div class="sec" onclick="this.nextSibling.style.display=this.nextSibling.style.display===\'none\'?\'block\':\'none\'">// INSIGHTS ▾</div>'+
   '<div class="ins"><div class="gr">'+
   '<div><span>avg resolve</span> <b>'+avg+'</b></div>'+
   '<div><span>this week</span> <b>'+wk+'</b></div>'+
   '<div><span>stale &gt;2d</span> <b style="color:'+(stale?'var(--red)':'var(--green)')+'">'+stale+'</b></div>'+
   '<div><span>total</span> <b>'+ts.length+'</b></div>'+
   '</div><div class="spark">'+spark+'  <span style="color:var(--txt3);font-size:9px">7-day intake</span></div></div>';
}
function setTab(t){STATE.tab=t;tg&&tg.HapticFeedback&&tg.HapticFeedback.selectionChanged();render()}
function setKind(k){STATE.kind=k;render()}
function setRep(n){STATE.reporter=n;render()}
function cycleSort(){var i=SORTS.map(function(s){return s[0]}).indexOf(STATE.sort);var nx=SORTS[(i+1)%SORTS.length];STATE.sort=nx[0];document.getElementById('sortbtn').textContent=nx[1];render()}
function clearNew(){var mx=STATE.tickets.reduce(function(m,t){return Math.max(m,t.id)},0);STATE.lastSeen=mx;try{localStorage.setItem('vr_lastseen',String(mx))}catch(e){}STATE.newIds=[];render()}
function find(id){for(var i=0;i<STATE.tickets.length;i++)if(STATE.tickets[i].id===id)return STATE.tickets[i];return null}
function openT(id){
  var t=find(id);if(!t)return;STATE.cur=id;
  var tag=t.done?'done':(t.prog?'prog':'new'),lab=t.done?'SHIPPED':(t.prog?'PROG':'NEW');
  document.getElementById('sh-id').textContent='#'+id+(t.assignee?(' · @'+H(t.assignee)):'');
  var meta='<span style="color:'+t.color+'">●&nbsp;'+H(t.who)+'</span><span>'+H(t.status)+'</span>';
  if(t.priority)meta+='<span>prio '+H(t.priority)+'</span>';
  if(t.ver)meta+='<span>v'+H(t.ver)+'</span>';if(t.pv)meta+='<span>from v'+H(t.pv)+'</span>';
  if(t.proj)meta+='<span>'+H(t.proj)+'</span>';meta+='<span>'+ageS(t.created)+' old</span>';
  var shots=(t.shots||[]).length?('<div class="shots">'+t.shots.map(function(u){return '<img src="'+H(u)+'" onclick="tg&&tg.openLink&&tg.openLink(\''+H(u)+'\')">'}).join('')+'</div>'):'';
  var pdf=t.pdf?('<a class="pdfbtn" href="'+H(t.pdf)+'" target="_blank" onclick="tg&&tg.openLink&&(event.preventDefault(),tg.openLink(\''+H(t.pdf)+'\'))">📄 open PDF report</a>'):'';
  var thread=(t.thread||[]).map(function(m){return '<div class="tmsg '+(m.author==='office'?'office':'reporter')+'"><div class="a">'+(m.author==='office'?'OFFICE':H(t.who))+' · '+ageS(m.created_at)+'</div>'+H(m.body)+'</div>'}).join('');
  var acts='<div class="acts">'+
    (t.status!=='in_progress'?'<button class="act" onclick="setStatus('+id+',\'in_progress\')">▸ In progress</button>':'')+
    (t.status!=='done'?'<button class="act go" onclick="setStatus('+id+',\'done\')">✓ Mark done</button>':'')+
    (t.status==='done'?'<button class="act warn" onclick="setStatus('+id+',\'reopened\')">↻ Reopen</button>':'')+
    '<button class="act asn" onclick="assign('+id+',\'A\')">→ A</button>'+
    '<button class="act asn" onclick="assign('+id+',\'B\')">→ B</button>'+
    (t.assignee?'<button class="act" onclick="assign('+id+',\'\')">unassign</button>':'')+'</div>';
  document.getElementById('sh-body').innerHTML=
    '<div class="tag '+tag+'" style="display:inline-block;margin-bottom:8px">'+lab+'</div>'+
    '<div class="dt">'+(t.kind==='bug'?'🐛 ':'✨ ')+H(t.title)+'</div>'+
    '<div class="dm">'+meta+'</div>'+shots+pdf+
    '<div class="db">'+(H(t.body)||'(no description)')+'</div>'+acts+
    (thread?('<div class="thread"><div class="sec">// CONVERSATION</div>'+thread+'</div>'):'');
  document.getElementById('tmpl').innerHTML=TEMPLATES.map(function(x,i){return '<button onclick="useTmpl('+i+')">'+H(x.slice(0,22))+(x.length>22?'…':'')+'</button>'}).join('');
  document.getElementById('sheet').classList.add('on');
  if(tg){tg.MainButton&&tg.MainButton.hide();tg.HapticFeedback&&tg.HapticFeedback.impactOccurred('light');tg.BackButton&&(tg.BackButton.show(),tg.BackButton.onClick(closeT))}
}
function useTmpl(i){var box=document.getElementById('reply-text');box.value=TEMPLATES[i];box.focus()}
function closeT(){document.getElementById('sheet').classList.remove('on');STATE.cur=null;if(tg){tg.BackButton&&tg.BackButton.hide();tg.MainButton&&tg.MainButton.show()}}
document.getElementById('back').onclick=closeT;
document.getElementById('reply-send').onclick=function(){
  var box=document.getElementById('reply-text'),txt=box.value.trim();if(!txt||!STATE.cur)return;
  var btn=this;btn.disabled=true;
  api('/reply',{method:'POST',body:JSON.stringify({initData:tg?tg.initData:'',ticket_id:STATE.cur,text:txt})}).then(function(res){
    btn.disabled=false;
    if(res.ok){box.value='';toast('reply sent');tg&&tg.HapticFeedback&&tg.HapticFeedback.notificationOccurred('success');
      var id=STATE.cur;load();setTimeout(function(){openT(id)},500);}
    else{toast('reply failed')}
  }).catch(function(){btn.disabled=false;toast('reply failed')});
};
function setStatus(id,st){
  api('/status',{method:'POST',body:JSON.stringify({initData:tg?tg.initData:'',ticket_id:id,status:st})}).then(function(res){
    if(res.ok){toast('→ '+st);tg&&tg.HapticFeedback&&tg.HapticFeedback.notificationOccurred('success');load();setTimeout(function(){openT(id)},500)}else{toast('update failed')}
  });
}
function assign(id,who){
  api('/assign',{method:'POST',body:JSON.stringify({initData:tg?tg.initData:'',ticket_id:id,assignee:who})}).then(function(res){
    if(res.ok){toast(who?('assigned → '+who):'unassigned');tg&&tg.HapticFeedback&&tg.HapticFeedback.notificationOccurred('success');load();setTimeout(function(){openT(id)},500)}else{toast('assign failed')}
  });
}
load();
setInterval(function(){if(!document.getElementById('sheet').classList.contains('on'))load()},45000);
</script></body></html>
