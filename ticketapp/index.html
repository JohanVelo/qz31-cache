<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1">
<title>Velocity Relay</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#05070C;--cell:#0D1320;--line:rgba(120,170,220,.12);--line2:rgba(120,170,220,.22);
 --cyan:#1AE5FF;--green:#3DFF9A;--amber:#FFB020;--red:#FF4D5E;
 --txt:#EAF3FF;--txt2:#8AA0BE;--txt3:#53678A;--d:'Chakra Petch',sans-serif;--m:'JetBrains Mono',monospace}
html,body{height:100%;background:var(--bg)}
body{font-family:var(--d);color:var(--txt);display:flex;flex-direction:column;height:100vh;overflow:hidden;
 background:radial-gradient(700px 400px at 50% -10%,rgba(26,229,255,.10),transparent 60%),
 radial-gradient(560px 420px at 100% 4%,rgba(255,176,32,.06),transparent 55%),var(--bg)}
.top{flex:0 0 auto;padding:14px 14px 10px;border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;gap:10px}
.glyph{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;
 background:linear-gradient(135deg,var(--cyan),#1AA6FF);color:#04070D;box-shadow:0 0 18px rgba(26,229,255,.5)}
.wm{font-weight:700;font-size:15px;letter-spacing:1.1px;line-height:1.05}
.wm small{display:block;font-family:var(--m);font-size:7.5px;letter-spacing:3px;color:var(--txt2);margin-top:2px}
.opp{margin-left:auto;text-align:right;font-family:var(--m);font-size:9px;color:var(--txt3)}
.opp .live{color:var(--green)}
.kp{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:11px}
.kc{background:var(--cell);border:1px solid var(--line);border-radius:10px;padding:8px 6px;text-align:center}
.kc .l{font-family:var(--m);font-size:8px;letter-spacing:1px;color:var(--txt3)}
.kc .n{font-weight:700;font-size:20px;line-height:1;margin-top:3px}
.kc.open .n{color:var(--amber)}.kc.openclr .n{color:var(--green)}.kc.done .n{color:var(--green)}.kc.rep .n{color:var(--cyan)}
.chips{display:flex;gap:7px;overflow-x:auto;margin-top:10px;padding-bottom:2px}
.chip{flex:0 0 auto;font-family:var(--m);font-size:11px;padding:6px 11px;border-radius:18px;border:1px solid var(--line2);
 background:var(--cell);color:var(--txt2);white-space:nowrap;display:flex;align-items:center;gap:6px}
.chip i{width:8px;height:8px;border-radius:50%}
.chip.on{color:#04070D;background:var(--cyan);border-color:var(--cyan);font-weight:700}.chip.on i{display:none}
.list{flex:1 1 auto;overflow-y:auto;padding:10px 14px 20px;-webkit-overflow-scrolling:touch}
.sec{font-family:var(--m);font-size:9px;letter-spacing:2px;color:var(--txt3);margin:8px 2px;display:flex;align-items:center;gap:9px}
.sec::after{content:"";flex:1;height:1px;background:var(--line)}
.row{display:flex;align-items:center;gap:10px;background:var(--cell);border:1px solid var(--line);border-radius:10px;
 padding:11px 12px;margin-top:8px;border-left:3px solid var(--line)}
.row:active{transform:scale(.99)}
.tag{font-family:var(--m);font-size:8px;padding:3px 6px;border-radius:5px;flex:0 0 auto;min-width:56px;text-align:center}
.tag.new{color:var(--amber);background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.3)}
.tag.prog{color:var(--cyan);background:rgba(26,229,255,.12);border:1px solid rgba(26,229,255,.3)}
.tag.done{color:var(--green);background:rgba(61,255,154,.1);border:1px solid rgba(61,255,154,.25)}
.tid{font-family:var(--m);font-size:10px;color:var(--txt3);font-weight:700}
.ttl{font-weight:600;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.who{font-family:var(--m);font-size:9px;display:flex;align-items:center;gap:5px}.who i{width:7px;height:7px;border-radius:50%}
.badge{font-family:var(--m);font-size:9px;color:var(--cyan);background:rgba(26,229,255,.1);border-radius:9px;padding:2px 6px}
.empty{font-family:var(--m);font-size:12px;color:var(--green);text-align:center;padding:18px;background:var(--cell);border:1px dashed rgba(61,255,154,.25);border-radius:10px;margin-top:8px}
/* detail / thread sheet — full screen */
.sheet{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:60}
.sheet.on{display:flex}
.sh-top{flex:0 0 auto;padding:14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.sh-top .back{font-family:var(--m);font-size:12px;color:var(--cyan);cursor:pointer}
.sh-body{flex:1 1 auto;overflow-y:auto;padding:14px}
.dt{font-size:18px;font-weight:700;line-height:1.25;margin-bottom:8px}
.dm{font-family:var(--m);font-size:11px;color:var(--txt2);display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.dm span{background:var(--cell);border:1px solid var(--line);border-radius:6px;padding:4px 8px}
.db{font-size:13px;color:#C3D2E4;line-height:1.6;white-space:pre-wrap;background:var(--cell);border:1px solid var(--line);border-radius:10px;padding:12px}
.thread{margin-top:14px}.tmsg{margin-top:8px;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.5}
.tmsg.office{background:rgba(26,229,255,.08);border:1px solid rgba(26,229,255,.25);margin-left:24px}
.tmsg.reporter{background:var(--cell);border:1px solid var(--line);margin-right:24px}
.tmsg .a{font-family:var(--m);font-size:8.5px;color:var(--txt3);margin-bottom:3px}
.acts{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.act{font-family:var(--m);font-size:11px;padding:8px 12px;border-radius:9px;border:1px solid var(--line2);background:var(--cell);color:var(--txt2);cursor:pointer}
.act.go{background:rgba(61,255,154,.12);border-color:rgba(61,255,154,.4);color:var(--green)}
.act.warn{background:rgba(255,176,32,.12);border-color:rgba(255,176,32,.4);color:var(--amber)}
.reply{flex:0 0 auto;display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);background:#070A11}
.reply textarea{flex:1;resize:none;height:42px;background:var(--cell);border:1px solid var(--line2);border-radius:10px;
 color:var(--txt);font-family:var(--d);font-size:13px;padding:10px 12px}
.reply textarea:focus{outline:none;border-color:var(--cyan)}
.reply .send{flex:0 0 auto;background:linear-gradient(135deg,var(--cyan),#1AA6FF);color:#04070D;font-weight:700;
 border:none;border-radius:10px;padding:0 16px;font-family:var(--m);font-size:12px;cursor:pointer}
.deny{padding:60px 24px;text-align:center;font-family:var(--m);color:var(--amber)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--cell);border:1px solid var(--line2);
 color:var(--txt);font-family:var(--m);font-size:12px;padding:9px 14px;border-radius:10px;z-index:99;opacity:0;transition:.2s}
.toast.on{opacity:1}
</style></head><body>
<div id="app" style="display:none;flex-direction:column;height:100%">
  <div class="top">
    <div class="bar">
      <div class="glyph">🎫</div>
      <div class="wm">VELOCITY RELAY<small>MISSION&nbsp;CONTROL&nbsp;//&nbsp;TICKET&nbsp;OPS</small></div>
      <div class="opp"><span class="live">●</span> <span id="ts">LIVE</span></div>
    </div>
    <div class="kp" id="kp"></div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="list" id="list"></div>
</div>
<div class="deny" id="deny" style="display:none">⚠ Not authorized.<br>This board is private to the planning office.</div>
<div class="sheet" id="sheet">
  <div class="sh-top"><span class="back" id="back">‹ BACK</span><span class="tid" id="sh-id"></span></div>
  <div class="sh-body" id="sh-body"></div>
  <div class="reply"><textarea id="reply-text" placeholder="Reply to the planner…"></textarea><button class="send" id="reply-send">SEND</button></div>
</div>
<div class="toast" id="toast"></div>
<script>
var tg=window.Telegram&&window.Telegram.WebApp?window.Telegram.WebApp:null;
var API="https://hrrdohlrfrficrtphcet.supabase.co/functions/v1/velocity-relay";
var STATE={tickets:[],filter:null,cur:null};
function H(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function age(iso){try{var h=(Date.now()-new Date(iso).getTime())/3.6e6;return h<48?(h|0)+'h':((h/24)|0)+'d'}catch(e){return''}}
var PAL=["#1AE5FF","#3DFF9A","#FFB020","#9D8CFF","#FF6FB5","#2DD4BF","#5B9DFF","#FF4D5E"];
function color(n){var h=0,s=String(n||'?');for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return PAL[h%PAL.length]}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},1900)}
function hdrs(){return{'Content-Type':'application/json','X-Init-Data':tg?tg.initData:''}}
function api(p,opt){opt=opt||{};opt.headers=hdrs();return fetch(API+p,opt).then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j}})})}

if(tg){try{tg.ready();tg.expand();tg.enableClosingConfirmation&&tg.enableClosingConfirmation();
 tg.setHeaderColor&&tg.setHeaderColor('#05070C');tg.setBackgroundColor&&tg.setBackgroundColor('#05070C');}catch(e){}}

function load(){
  api('/tickets').then(function(res){
    if(!res.ok){document.getElementById('app').style.display='none';document.getElementById('deny').style.display='block';return}
    STATE.tickets=res.j.tickets||[];
    document.getElementById('app').style.display='flex';
    document.getElementById('ts').textContent='LIVE '+new Date().toLocaleTimeString().slice(0,5);
    render();
  }).catch(function(){toast('connection error')});
}
function counts(){var o=0,d=0,reps={};STATE.tickets.forEach(function(t){if(t.open)o++;if(t.done)d++;reps[t.who]=1});return{o:o,d:d,r:Object.keys(reps).length}}
function render(){
  var c=counts();
  document.getElementById('kp').innerHTML=
   '<div class="kc '+(c.o?'open':'openclr')+'"><div class="l">OPEN</div><div class="n">'+c.o+'</div></div>'+
   '<div class="kc done"><div class="l">SHIPPED</div><div class="n">'+c.d+'</div></div>'+
   '<div class="kc rep"><div class="l">REPORTERS</div><div class="n">'+c.r+'</div></div>'+
   '<div class="kc"><div class="l">TOTAL</div><div class="n">'+STATE.tickets.length+'</div></div>';
  var reps={};STATE.tickets.forEach(function(t){reps[t.who]=t.color});
  var ch='<div class="chip '+(STATE.filter===null?'on':'')+'" onclick="setF(null)">ALL</div>';
  Object.keys(reps).forEach(function(n){ch+='<div class="chip '+(STATE.filter===n?'on':'')+'" onclick="setF(\''+n.replace(/'/g,"\\'")+'\')"><i style="background:'+reps[n]+'"></i>'+H(n)+'</div>'});
  document.getElementById('chips').innerHTML=ch;
  var ts=STATE.tickets.filter(function(t){return STATE.filter===null||t.who===STATE.filter});
  var opens=ts.filter(function(t){return t.open}),done=ts.filter(function(t){return t.done});
  var h='<div class="sec">// INBOX'+(opens.length?(' · '+opens.length):'')+'</div>';
  h+=opens.length?opens.map(rowHtml).join(''):'<div class="empty">✦ ALL CLEAR — nothing waiting</div>';
  h+='<div class="sec">// SHIPPED · RECENT</div>'+(done.length?done.slice(0,40).map(rowHtml).join(''):'<div class="empty" style="color:var(--txt3);border-color:var(--line)">none</div>');
  document.getElementById('list').innerHTML=h;
}
function rowHtml(t){
  var tag=t.done?'done':(t.prog?'prog':'new'),lab=t.done?'SHIPPED':(t.prog?'PROG':'NEW');
  var ic=t.kind==='bug'?'🐛':'✨',right=t.done?('v'+(H(t.ver)||'?')):age(t.created);
  var thread=t.thread&&t.thread.length?('<span class="badge">💬 '+t.thread.length+'</span>'):'';
  return '<div class="row" style="border-left-color:'+t.color+'" onclick="openT('+t.id+')">'+
   '<span class="tag '+tag+'">'+lab+'</span><span class="tid">#'+H(t.id)+'</span>'+
   '<span class="ttl">'+ic+' '+H(t.title)+'</span>'+thread+
   '<span class="who" style="color:'+t.color+'"><i style="background:'+t.color+'"></i>'+H(t.who)+'</span>'+
   '<span class="tid">'+right+'</span></div>';
}
function setF(n){STATE.filter=n;tg&&tg.HapticFeedback&&tg.HapticFeedback.selectionChanged();render()}
function find(id){for(var i=0;i<STATE.tickets.length;i++)if(STATE.tickets[i].id===id)return STATE.tickets[i];return null}
function openT(id){
  var t=find(id);if(!t)return;STATE.cur=id;
  var tag=t.done?'done':(t.prog?'prog':'new'),lab=t.done?'SHIPPED':(t.prog?'PROG':'NEW');
  document.getElementById('sh-id').textContent='#'+id;
  var meta='<span style="color:'+t.color+'">●&nbsp;'+H(t.who)+'</span><span>'+H(t.status)+'</span>';
  if(t.ver)meta+='<span>v'+H(t.ver)+'</span>';if(t.pv)meta+='<span>from v'+H(t.pv)+'</span>';
  if(t.proj)meta+='<span>'+H(t.proj)+'</span>';meta+='<span>'+age(t.created)+' old</span>';
  var thread=(t.thread||[]).map(function(m){return '<div class="tmsg '+(m.author==='office'?'office':'reporter')+'"><div class="a">'+(m.author==='office'?'OFFICE':H(t.who))+' · '+age(m.created_at)+'</div>'+H(m.body)+'</div>'}).join('');
  var acts='<div class="acts">'+
    (t.status!=='in_progress'?'<button class="act" onclick="setStatus('+id+',\'in_progress\')">▸ In progress</button>':'')+
    (t.status!=='done'?'<button class="act go" onclick="setStatus('+id+',\'done\')">✓ Mark done</button>':'')+
    (t.status==='done'?'<button class="act warn" onclick="setStatus('+id+',\'reopened\')">↻ Reopen</button>':'')+'</div>';
  document.getElementById('sh-body').innerHTML=
    '<div class="tag '+tag+'" style="display:inline-block;margin-bottom:8px">'+lab+'</div>'+
    '<div class="dt">'+(t.kind==='bug'?'🐛 ':'✨ ')+H(t.title)+'</div>'+
    '<div class="dm">'+meta+'</div>'+
    '<div class="db">'+(H(t.body)||'(no description)')+'</div>'+acts+
    (thread?('<div class="thread"><div class="sec">// CONVERSATION</div>'+thread+'</div>'):'');
  document.getElementById('sheet').classList.add('on');
  if(tg){tg.HapticFeedback&&tg.HapticFeedback.impactOccurred('light');tg.BackButton&&(tg.BackButton.show(),tg.BackButton.onClick(closeT))}
}
function closeT(){document.getElementById('sheet').classList.remove('on');STATE.cur=null;if(tg&&tg.BackButton)tg.BackButton.hide()}
document.getElementById('back').onclick=closeT;
document.getElementById('reply-send').onclick=function(){
  var box=document.getElementById('reply-text'),txt=box.value.trim();if(!txt||!STATE.cur)return;
  this.disabled=true;var btn=this;
  api('/reply',{method:'POST',body:JSON.stringify({initData:tg?tg.initData:'',ticket_id:STATE.cur,text:txt})}).then(function(res){
    btn.disabled=false;
    if(res.ok){box.value='';toast('reply sent');tg&&tg.HapticFeedback&&tg.HapticFeedback.notificationOccurred('success');
      var id=STATE.cur;setTimeout(function(){load();setTimeout(function(){openT(id)},400)},300);}
    else{toast('reply failed')}
  }).catch(function(){btn.disabled=false;toast('reply failed')});
};
function setStatus(id,st){
  api('/status',{method:'POST',body:JSON.stringify({initData:tg?tg.initData:'',ticket_id:id,status:st})}).then(function(res){
    if(res.ok){toast('→ '+st);tg&&tg.HapticFeedback&&tg.HapticFeedback.notificationOccurred('success');load();setTimeout(function(){openT(id)},400)}
    else{toast('update failed')}
  });
}
load();
setInterval(function(){if(!document.getElementById('sheet').classList.contains('on'))load()},45000);
</script></body></html>
